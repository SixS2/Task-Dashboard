<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Aero Navy Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:attr="nonce=${cspNonce}">
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    fontFamily: { sans: ['Josefin Sans', 'sans-serif'] },
                    backgroundImage: {
                        'aero-navy': 'linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%)',
                        'aero-light': 'linear-gradient(135deg, #f8fafc 0%, #e2e8f0 70%, #94a3b8 100%)',
                        'gel-button': 'linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 45%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.2) 100%)',
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(15, 23, 42, 0.2)',
                        'gel': 'inset 0 1px 2px rgba(255,255,255,0.5), inset 0 -1px 2px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1)',
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '2.5rem' }
                } 
            }
        }
    </script>
    <style>
        /* Glassmorphism Aero Style */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.1);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Decorative Bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.1) 60%, transparent 80%);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.4), 0 10px 30px rgba(0, 0, 0, 0.05);
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        .dark .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.1) 60%, transparent 80%);
        }

        /* Gel Button Aero Feel */
        .btn-gel {
            background-image: theme('backgroundImage.gel-button');
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gel:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); filter: brightness(1.05); }
        .btn-gel:active { transform: translateY(0); filter: brightness(0.95); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.2); border-radius: 99px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-aero-light dark:bg-aero-navy min-h-screen text-slate-800 dark:text-slate-100 font-sans transition-colors duration-500 relative overflow-x-hidden">

    <!-- Locked Aero Bubbles -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="bubble w-96 h-96 -top-20 -left-20 opacity-70 animate-pulse duration-[10s]"></div>
        <div class="bubble w-64 h-64 top-1/2 -right-10 opacity-40 animate-bounce duration-[8s]"></div>
        <div class="bubble w-48 h-48 bottom-10 left-1/3 opacity-30"></div>
    </div>

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-50 px-4 pt-4 sm:px-6 lg:px-8">
        <nav class="glass-panel rounded-3xl h-16 max-w-7xl mx-auto flex items-center justify-between px-6 shadow-glass border-b-2 border-white/40 dark:border-white/10">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 dark:bg-white p-2 rounded-2xl text-white dark:text-slate-900 shadow-gel transform -rotate-3 transition-transform hover:rotate-0">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                    </svg>
                </div>
                <span class="font-black text-xl tracking-tight text-slate-900 dark:text-white uppercase hidden xs:block">Admin<span class="text-slate-400 font-normal">Hub</span></span>
            </div>
            
            <div class="flex items-center space-x-3 sm:space-x-5">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="flex items-center justify-center p-3 rounded-2xl bg-white/50 dark:bg-black/20 border border-white/60 dark:border-white/10 shadow-gel text-slate-600 dark:text-slate-400 hover:scale-110 active:scale-95 transition-all">
                    <svg id="theme-icon-dark" class="hidden w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="theme-icon-light" class="hidden w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>

                <span class="h-8 w-px bg-slate-400/20"></span>

                <a href="/logout" class="btn-gel bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-2.5 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl flex items-center gap-2">
                    Sair <svg class="w-4 h-4 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        
        <div class="mb-12 text-center sm:text-left">
            <h1 class="text-4xl sm:text-5xl font-black text-slate-900 dark:text-white tracking-tight leading-none">Console <span class="text-slate-400 dark:text-slate-500">Mural</span></h1>
            <p class="mt-3 text-[10px] font-black uppercase tracking-[0.4em] text-slate-500 dark:text-slate-400 bg-white/20 dark:bg-black/10 inline-block px-3 py-1 rounded-full border border-white/40 dark:border-white/10">Gestão Aero Navy de Comunicados</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Floating Form: Novo Aviso -->
            <div class="lg:col-span-5 w-full">
                <div class="glass-panel rounded-5xl p-8 sm:p-10 shadow-2xl border-t-2 border-white/60 dark:border-white/20 ring-1 ring-black/5">
                    <h2 class="text-2xl font-black text-slate-900 dark:text-white mb-8 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-2xl bg-indigo-500/10 dark:bg-white/10 flex items-center justify-center text-indigo-600 dark:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        Novo Protocolo
                    </h2>
                    
                    <form action="/admin/add" method="post" enctype="multipart/form-data" class="space-y-6">
                        <input type="hidden" name="_csrf" th:value="${session.csrf_token}">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Título do Comunicado</label>
                            <input list="sugestoes-titulos" type="text" name="title" required placeholder="Ex: Aula de Reforço"
                                class="w-full px-5 py-4 bg-white/60 dark:bg-slate-800/60 border border-white dark:border-slate-700 rounded-3xl focus:ring-4 focus:ring-indigo-500/20 outline-none text-slate-900 dark:text-white font-black transition-all placeholder:text-slate-300">
                            <datalist id="sugestoes-titulos">
                                <option value="Prazo Prorrogado"></option>
                                <option value="Evento Acadêmico"></option>
                                <option value="Mudança de Sala"></option>
                            </datalist>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Descrição da Atividade</label>
                            <textarea name="content" required rows="3" placeholder="Insira o texto completo aqui..."
                                class="w-full px-5 py-4 bg-white/60 dark:bg-slate-800/60 border border-white dark:border-slate-700 rounded-3xl focus:ring-4 focus:ring-indigo-500/20 outline-none text-slate-900 dark:text-white font-semibold transition-all placeholder:text-slate-300"></textarea>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Mídia / Anexo</label>
                                <input type="file" name="image" accept="image/*"
                                    class="block w-full text-transparent font-bold
                                    file:mr-4 file:py-2.5 file:px-6
                                    file:rounded-2xl file:border-0
                                    file:text-[10px] file:font-black file:uppercase
                                    file:bg-slate-900 file:text-white dark:file:bg-white dark:file:text-slate-900
                                    hover:file:opacity-90 transition-all cursor-pointer">
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Permanência (Dias)</label>
                                <div class="relative">
                                    <select name="dias" class="w-full pl-5 pr-12 py-4 bg-white/60 dark:bg-slate-800/60 border border-white dark:border-slate-700 rounded-3xl focus:ring-4 focus:ring-indigo-500/20 outline-none text-slate-900 dark:text-white font-black cursor-pointer appearance-none">
                                        <option value="1">Expira em 1 dia</option>
                                        <option value="7" selected>Expira em 1 semana</option>
                                        <option value="30">Expira em 1 mês</option>
                                    </select>
                                    <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-gel w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-black uppercase tracking-[0.2em] rounded-3xl shadow-xl flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Disparar Mensagem
                        </button>
                    </form>
                </div>
            </div>

            <!-- Notice List -->
            <div class="lg:col-span-7 space-y-6 w-full">
                <div class="flex items-center justify-between pb-2 border-b-2 border-slate-900/10 dark:border-white/10">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 dark:text-slate-400">Mensagens Ativas</h3>
                    <div class="bg-indigo-600 dark:bg-indigo-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-lg" th:text="${#lists.size(avisos)} + ' Itens'">0 Itens</div>
                </div>

                <div th:unless="${#lists.isEmpty(avisos)}" class="grid gap-6">
                    <div th:each="aviso : ${avisos}" class="group glass-panel rounded-4xl p-6 flex flex-col sm:flex-row gap-6 items-center sm:items-start transition-all hover:scale-[1.01] hover:bg-white/60 dark:hover:bg-slate-800/50" th:classappend="${aviso.expired} ? 'opacity-40 saturate-0' : ''">
                        
                        <!-- Thumbnail -->
                        <div th:if="${aviso.imageUrl}" class="w-full sm:w-32 h-32 rounded-3xl overflow-hidden shadow-gel border-4 border-white/60 flex-shrink-0">
                            <img th:src="${aviso.imageUrl}" class="w-full h-full object-cover transition-transform group-hover:scale-110 duration-700" alt="Notice Image">
                        </div>
                        <div th:unless="${aviso.imageUrl}" class="w-full sm:w-32 h-32 rounded-3xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-300 border-4 border-white dark:border-slate-700 flex-shrink-0">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>

                        <!-- Content -->
                        <div class="flex-grow text-center sm:text-left space-y-2">
                            <div class="flex flex-col sm:flex-row items-center gap-3">
                                <h4 class="text-xl font-black text-slate-900 dark:text-white leading-tight" th:text="${aviso.title}"></h4>
                                <span th:if="${aviso.expired}" class="bg-red-100 text-red-600 px-3 py-0.5 rounded-full text-[8px] font-black uppercase">Expirado</span>
                            </div>
                            <p class="text-sm text-slate-600 dark:text-slate-400 font-semibold leading-relaxed" th:text="${aviso.content}"></p>
                            
                            <div class="pt-4 flex flex-wrap justify-center sm:justify-start gap-4 text-[9px] font-black uppercase tracking-widest text-slate-400">
                                <div class="flex items-center gap-1.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    <span th:text="${aviso.createdAt}">00/00</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span th:text="${aviso.expiresAt}">00/00</span>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="sm:self-center">
                            <form action="/admin/remove" method="post">
                                <input type="hidden" name="_csrf" th:value="${session.csrf_token}">
                                <input type="hidden" name="id" th:value="${aviso.id}" />
                                <button type="submit" onclick="return confirm('Excluir permanentemente?');" 
                                    class="btn-gel p-4 bg-red-50 text-red-500 dark:bg-red-950/20 dark:text-red-400 rounded-3xl border border-red-100 dark:border-red-900/30 hover:bg-red-500 hover:text-white dark:hover:bg-red-500 transition-all">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(avisos)}" class="glass-panel rounded-5xl p-20 text-center border-dashed border-2 border-slate-300 dark:border-slate-700">
                    <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    </div>
                    <p class="text-sm font-black uppercase tracking-widest text-slate-400">Nenhum aviso transmitindo</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Theme Logic Script -->
    <script th:attr="nonce=${cspNonce}">
        const themeIconDark = document.getElementById('theme-icon-dark');
        const themeIconLight = document.getElementById('theme-icon-light');

        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                themeIconDark.classList.add('hidden');
                themeIconLight.classList.remove('hidden');
            } else {
                themeIconDark.classList.remove('hidden');
                themeIconLight.classList.add('hidden');
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        window.addEventListener('load', updateThemeIcons);

        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateThemeIcons();
        });
    </script>
</body>
</html>
