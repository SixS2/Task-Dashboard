<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" class="transition-colors duration-300">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script th:attr="nonce=${cspNonce}">
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="text-slate-800 bg-slate-50 dark:bg-slate-900 dark:text-slate-200 antialiased min-h-screen flex flex-col items-center justify-center transition-colors duration-300">
    <div class="text-center px-6">
        <div class="flex justify-center mb-6">
            <svg class="h-20 w-20 text-teal-500 dark:text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        </div>
        <h1 class="text-5xl font-extrabold text-slate-900 dark:text-white mb-3">Oops!</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 mb-8">A página que você procura não foi encontrada ou ocorreu um erro inesperado.</p>
        <a href="/"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-lg text-sm font-semibold text-white bg-teal-600 hover:bg-teal-700 transition-colors shadow-sm hover:shadow">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Voltar ao Dashboard
        </a>
    </div>
</body>

</html>
